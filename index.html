<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jet Lag · Race to Athens — Spinner</title>
<meta name="description" content="A themed spinning wheel for the Jet Lag: Race to Athens game." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
<noscript><link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" /></noscript>

<style>
  :root {
    --cream:      #FBF6E9;
    --cream-2:    #F4ECD7;
    --cream-3:    #EFE4C9;
    --pink:       #C77DA1;
    --pink-soft:  #EFC5D8;
    --pink-wrong: #F3C5CB;
    --gold:       #C2A576;
    --gold-deep:  #A8895A;
    --serif-gold: #897335;
    --ink:        #5E4B2B;
    --green-ok:   #BCDDB4;
    --pink-text:  #BE6E94;
    --gold-label: #6E5A30;

    --font-script: "Pinyon Script", "Brush Script MT", cursive;
    --font-serif:  "Cormorant Garamond", Georgia, "Times New Roman", serif;
    --font-mono:   "Courier Prime", "Courier New", ui-monospace, monospace;

    --radius: 14px;
    --shadow: 0 10px 30px rgba(120, 95, 45, 0.18);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow-x: hidden; }

  body {
    background: radial-gradient(1200px 700px at 50% -10%, #fffdf6 0%, rgba(255,253,246,0) 60%), var(--cream);
    color: var(--ink);
    font-family: var(--font-serif);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  #bgCanvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    width: 100%;
    height: 100%;
  }

  #screenFlash {
    position: fixed;
    inset: 0;
    z-index: 49;
    pointer-events: none;
    background: white;
    opacity: 0;
  }

  .frame {
    position: relative;
    z-index: 1;
    max-width: 1120px;
    margin: 26px auto;
    padding: clamp(18px, 4vw, 42px) clamp(16px, 4vw, 46px) clamp(22px, 4vw, 40px);
    background: var(--cream);
    border: 11px solid transparent;
    border-image: repeating-linear-gradient(45deg, var(--gold) 0 6px, #e7d2a6 6px 9px, var(--gold-deep) 9px 15px) 11 round;
    box-shadow: var(--shadow), 0 0 100px rgba(194,165,118,0.07);
  }
  .frame::before {
    content: "";
    position: absolute;
    inset: 6px;
    border: 1.5px solid var(--gold-deep);
    pointer-events: none;
  }
  .frame::after {
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(168,137,90,0.45);
    pointer-events: none;
  }

  header { text-align: center; margin-bottom: 14px; position: relative; z-index: 1; }
  .title {
    font-family: var(--font-script);
    color: var(--pink-text);
    font-size: clamp(58px, 12vw, 116px);
    line-height: 0.9;
    margin: 4px 0 0;
    text-shadow: 0 2px 0 rgba(255,255,255,0.6), 0 0 50px rgba(199,125,161,0.12);
    animation: title-breathe 5s ease-in-out infinite;
  }
  @keyframes title-breathe {
    0%, 100% { text-shadow: 0 2px 0 rgba(255,255,255,0.6), 0 0 40px rgba(199,125,161,0.08); }
    50%       { text-shadow: 0 2px 0 rgba(255,255,255,0.6), 0 0 70px rgba(199,125,161,0.22); }
  }
  .subtitle {
    font-family: var(--font-serif);
    color: var(--serif-gold);
    font-weight: 600;
    letter-spacing: 0.06em;
    font-size: clamp(20px, 3.4vw, 30px);
    margin: 2px 0 0;
  }
  .subtitle .athens { font-family: var(--font-script); color: var(--pink-text); font-size: 1.5em; font-weight: 400; }
  .tagline {
    font-family: var(--font-mono);
    color: var(--gold-label);
    font-size: clamp(11px, 1.6vw, 13px);
    letter-spacing: 0.12em;
    margin-top: 8px;
    text-transform: uppercase;
  }
  .rule {
    width: min(420px, 80%);
    height: 1px;
    margin: 14px auto 4px;
    background: linear-gradient(90deg, transparent, var(--gold) 20%, var(--gold) 80%, transparent);
    position: relative;
  }
  .rule::after {
    content: "✈";
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    background: var(--cream);
    color: var(--pink);
    padding: 0 12px;
    font-size: 15px;
  }

  .stage {
    display: grid;
    grid-template-columns: minmax(280px, 1fr) minmax(280px, 380px);
    gap: clamp(20px, 4vw, 46px);
    align-items: start;
    margin-top: 18px;
  }
  @media (max-width: 860px) { .stage { grid-template-columns: 1fr; } }

  .wheel-wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; }

  .wheel-stage {
    position: relative;
    width: 100%;
    max-width: 560px;
    aspect-ratio: 1 / 1;
    margin: 0 auto;
    perspective: 900px;
  }

  /* Ambient glow that pulses behind the wheel when spinning */
  .wheel-halo {
    position: absolute;
    inset: -40px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(199,125,161,0.18) 0%, rgba(194,165,118,0.1) 40%, transparent 70%);
    filter: blur(22px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 0;
  }
  .wheel-stage.is-spinning .wheel-halo {
    opacity: 1;
    animation: halo-pulse 0.65s ease-in-out infinite alternate;
  }
  @keyframes halo-pulse {
    from { transform: scale(0.94); opacity: 0.75; }
    to   { transform: scale(1.06); opacity: 1; }
  }

  /* Tiltable inner wrapper */
  .wheel-inner {
    position: relative;
    width: 100%;
    height: 100%;
    will-change: transform;
  }

  #wheel {
    width: 100%;
    height: 100%;
    display: block;
    cursor: pointer;
    border-radius: 50%;
    filter: drop-shadow(0 12px 22px rgba(120,95,45,0.22));
    touch-action: manipulation;
    position: relative;
    z-index: 1;
    transition: filter 0.6s ease;
  }
  #wheel.spinning {
    animation: wheel-glow 0.7s ease-in-out infinite alternate;
  }
  @keyframes wheel-glow {
    from { filter: drop-shadow(0 12px 22px rgba(120,95,45,0.22)) drop-shadow(0 0 18px rgba(194,165,118,0.3)); }
    to   { filter: drop-shadow(0 12px 22px rgba(120,95,45,0.22)) drop-shadow(0 0 48px rgba(199,125,161,0.55)) drop-shadow(0 0 80px rgba(194,165,118,0.2)); }
  }
  #wheel.disabled { cursor: default; opacity: .65; }

  .pointer {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-top: 34px solid var(--gold);
    filter: drop-shadow(0 3px 2px rgba(120,95,45,0.4));
    z-index: 5;
    pointer-events: none;
  }
  .pointer::after {
    content: "";
    position: absolute;
    top: -40px; left: 50%;
    transform: translateX(-50%);
    width: 18px; height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #e0c98a, #C2A576);
    border: 2px solid var(--gold-deep);
    box-shadow: 0 0 0 3px rgba(194,165,118,0.18);
  }
  .pointer.landing {
    animation: pointer-glow-out 1.6s ease-out forwards;
  }
  @keyframes pointer-glow-out {
    0%   { filter: drop-shadow(0 3px 2px rgba(120,95,45,0.4)) drop-shadow(0 0 14px rgba(199,125,161,1)); }
    100% { filter: drop-shadow(0 3px 2px rgba(120,95,45,0.4)); }
  }

  .placeholder {
    position: absolute; inset: 0;
    display: none;
    align-items: center; justify-content: center;
    text-align: center; padding: 14% 18%;
    font-family: var(--font-serif);
    color: var(--gold-deep);
    font-size: clamp(16px,2.4vw,20px);
    border-radius: 50%;
    z-index: 2;
  }
  .empty .placeholder { display: flex; }

  .spin-btn {
    appearance: none; border: none; cursor: pointer;
    font-family: var(--font-mono);
    font-weight: 700;
    letter-spacing: 0.14em;
    color: #fff;
    font-size: clamp(18px, 2.6vw, 22px);
    background: linear-gradient(180deg, #b08e52, #8c7040 55%, #79633d);
    padding: 16px 56px 16px 34px;
    clip-path: polygon(0 18%, 72% 18%, 72% 0, 100% 50%, 72% 100%, 72% 82%, 0 82%);
    text-shadow: 0 1px 2px rgba(55,40,18,0.7);
    min-width: 210px;
    text-align: left;
    padding-left: clamp(28px, 6%, 46px);
    position: relative;
    box-shadow: 0 4px 18px rgba(120,90,30,0.35);
    transition: transform .12s ease, filter .12s ease, box-shadow .12s ease;
  }
  .spin-btn:hover  { transform: translateY(-3px); filter: brightness(1.07); box-shadow: 0 8px 26px rgba(120,90,30,0.45); }
  .spin-btn:active { transform: translateY(1px) scale(.99); }
  .spin-btn:disabled { cursor: not-allowed; filter: grayscale(.4) brightness(.95); opacity: .7; transform: none; box-shadow: none; }
  .spin-btn:focus-visible { outline: 3px solid var(--pink); outline-offset: 4px; }

  .panel {
    background: linear-gradient(180deg, #fffdf6, var(--cream-2));
    border: 1px solid rgba(168,137,90,0.35);
    border-radius: var(--radius);
    padding: 18px 18px 20px;
    box-shadow: 0 4px 14px rgba(120,95,45,0.08);
  }
  .panel h2 {
    font-family: var(--font-serif);
    color: var(--serif-gold);
    font-weight: 700;
    font-size: 22px;
    margin: 2px 0 12px;
    letter-spacing: .01em;
  }

  .presets { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .preset {
    appearance: none; cursor: pointer;
    font-family: var(--font-serif);
    font-weight: 600; font-size: 15px;
    color: var(--ink);
    background: var(--cream);
    border: 1.5px solid var(--gold);
    border-radius: 999px;
    padding: 7px 14px;
    transition: all .15s ease;
  }
  .preset:hover  { background: var(--cream-3); transform: translateY(-1px); box-shadow: 0 3px 10px rgba(120,95,45,0.12); }
  .preset.active { background: var(--pink-soft); border-color: var(--pink); color: #7a3d5c; }
  .preset:focus-visible { outline: 2px solid var(--pink); outline-offset: 2px; }

  label.fieldlabel {
    display: flex; align-items: center; justify-content: space-between;
    font-family: var(--font-mono); font-size: 12px; letter-spacing: .08em;
    color: var(--gold-label); text-transform: uppercase; margin-bottom: 6px;
  }
  .count { color: var(--gold-label); font-weight: 700; }

  textarea#entries {
    width: 100%;
    min-height: 170px;
    resize: vertical;
    font-family: var(--font-serif);
    font-size: 16px;
    line-height: 1.5;
    color: var(--ink);
    background: #fffdf7;
    border: 1px solid rgba(168,137,90,0.45);
    border-radius: 10px;
    padding: 10px 12px;
    transition: border-color .2s, box-shadow .2s;
  }
  textarea#entries:focus {
    outline: none;
    border-color: var(--pink);
    box-shadow: 0 0 0 3px rgba(199,125,161,0.15);
  }

  .row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .mini {
    appearance: none; cursor: pointer;
    font-family: var(--font-mono); font-size: 12.5px; letter-spacing: .04em;
    color: var(--ink); background: var(--cream);
    border: 1.5px solid var(--gold); border-radius: 8px;
    padding: 8px 12px;
    transition: background .14s ease, transform .1s ease, box-shadow .1s ease;
  }
  .mini:hover { background: var(--cream-3); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(120,95,45,0.1); }
  .mini:focus-visible { outline: 2px solid var(--pink); outline-offset: 2px; }

  .toggles { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
  .toggle { display: flex; align-items: center; gap: 10px; font-size: 16px; cursor: pointer; user-select: none; }
  .toggle input { width: 18px; height: 18px; accent-color: var(--pink); cursor: pointer; }
  .toggle small { color: var(--gold-label); font-family: var(--font-mono); font-size: 11px; }

  .overlay {
    position: fixed; inset: 0; z-index: 50;
    display: none;
    align-items: center; justify-content: center;
    background: rgba(94,75,43,0.38);
    backdrop-filter: blur(7px) saturate(1.3);
    -webkit-backdrop-filter: blur(7px) saturate(1.3);
    padding: 20px;
  }
  .overlay.show { display: flex; }

  .result-card {
    background: var(--cream);
    border: 9px solid transparent;
    border-image: repeating-linear-gradient(45deg, var(--gold) 0 6px, #e7d2a6 6px 9px, var(--gold-deep) 9px 15px) 9 round;
    box-shadow: var(--shadow), 0 40px 100px rgba(0,0,0,0.18);
    max-width: 520px; width: 100%;
    text-align: center;
    padding: 30px 28px 26px;
    position: relative;
    will-change: transform, opacity;
  }
  .result-eyebrow {
    font-family: var(--font-mono); text-transform: uppercase;
    letter-spacing: .18em; font-size: 13px; color: var(--gold-label);
  }
  .result-name {
    font-family: var(--font-script);
    color: var(--pink-text);
    font-size: clamp(40px, 9vw, 72px);
    line-height: 1.04;
    margin: 6px 0 4px;
    word-break: break-word;
  }
  .result-sub { font-family: var(--font-serif); color: var(--serif-gold); font-size: 18px; }
  .result-card.correct { background: var(--green-ok); }
  .result-card.wrong   { background: var(--pink-wrong); }
  .result-card.correct .result-name,
  .result-card.wrong   .result-name,
  .result-card.correct .result-sub,
  .result-card.wrong   .result-sub { color: var(--ink); }
  .result-actions { margin-top: 22px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .btn {
    appearance: none; cursor: pointer;
    font-family: var(--font-mono); font-weight: 700; letter-spacing: .08em;
    border-radius: 10px; padding: 12px 22px; font-size: 14px;
    border: 1.5px solid var(--gold); background: var(--cream); color: var(--ink);
    transition: all .14s ease;
  }
  .btn:hover  { background: var(--cream-3); transform: translateY(-1px); }
  .btn.primary { background: var(--pink-soft); border-color: var(--pink); color: #7a3d5c; }
  .btn.primary:hover { filter: brightness(1.04); }
  .btn:focus-visible { outline: 2px solid var(--pink); outline-offset: 2px; }

  footer {
    text-align: center; margin-top: 26px;
    font-family: var(--font-mono);
    color: var(--gold-deep);
    font-size: 12px; letter-spacing: .1em;
  }
  footer .heart { color: var(--pink); }

  .visually-hidden {
    position: absolute !important; width: 1px; height: 1px;
    padding: 0; margin: -1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
  }

  /* ── Wheel-name input ─── */
  input#wheelName {
    width: 100%;
    font-family: var(--font-serif);
    font-size: 17px;
    color: var(--ink);
    background: #fffdf7;
    border: 1px solid rgba(168,137,90,0.45);
    border-radius: 10px;
    padding: 9px 12px;
    margin-bottom: 14px;
    transition: border-color .2s, box-shadow .2s;
  }
  input#wheelName:focus {
    outline: none;
    border-color: var(--pink);
    box-shadow: 0 0 0 3px rgba(199,125,161,0.15);
  }

  /* ── Share button ─── */
  .share-btn {
    appearance: none; cursor: pointer;
    width: 100%;
    margin-top: 16px;
    font-family: var(--font-mono); font-weight: 700; letter-spacing: .08em;
    font-size: 14px;
    color: #fff;
    background: linear-gradient(180deg, #d089ab, #c77da1 55%, #b86a93);
    border: none;
    border-radius: 10px;
    padding: 13px 18px;
    box-shadow: 0 4px 14px rgba(199,125,161,0.35);
    transition: transform .12s ease, filter .12s ease, box-shadow .12s ease;
  }
  .share-btn:hover  { transform: translateY(-2px); filter: brightness(1.05); box-shadow: 0 7px 20px rgba(199,125,161,0.45); }
  .share-btn:active { transform: translateY(1px); }
  .share-btn:focus-visible { outline: 2px solid var(--gold-deep); outline-offset: 3px; }
  .share-btn.copied { background: linear-gradient(180deg, #9fc98e, #7fb069 55%, #6fa057); }

  /* ── Toast ─── */
  .toast {
    position: fixed;
    left: 50%; bottom: 38px;
    transform: translateX(-50%) translateY(20px);
    z-index: 80;
    background: var(--ink);
    color: var(--cream);
    font-family: var(--font-mono); font-size: 13px; letter-spacing: .05em;
    padding: 13px 22px;
    border-radius: 999px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.28);
    opacity: 0;
    pointer-events: none;
    display: flex; align-items: center; gap: 8px;
  }
  .toast .toast-ico { color: var(--pink-soft); }

  @media (prefers-reduced-motion: reduce) {
    .title, #wheel.spinning, .wheel-halo { animation: none !important; }
    .result-card { animation: none !important; }
  }
</style>
</head>
<body>

<canvas id="bgCanvas" aria-hidden="true"></canvas>
<div id="screenFlash" aria-hidden="true"></div>

<main class="frame">
  <header>
    <h1 class="title">Jet Lag</h1>
    <p class="subtitle">Race to <span class="athens">Athens</span></p>
    <div class="rule"></div>
    <p class="tagline">Modern Euro · Period 8 — Spin the Wheel</p>
  </header>

  <div class="stage">
    <section class="wheel-wrap" aria-label="Spinning wheel">
      <div class="wheel-stage" id="wheelStage">
        <div class="wheel-halo" aria-hidden="true"></div>
        <div class="wheel-inner" id="wheelInner">
          <div class="pointer" id="pointer" aria-hidden="true"></div>
          <canvas id="wheel" role="img" aria-label="Prize wheel"></canvas>
          <div class="placeholder">Add some options on the right, then spin! ✦</div>
        </div>
      </div>
      <button id="spinBtn" class="spin-btn" type="button">SPIN</button>
    </section>

    <aside class="panel" aria-label="Wheel options">
      <h2>What are we spinning?</h2>

      <div class="presets" id="presets" role="group" aria-label="Quick presets"></div>

      <input type="text" id="wheelName" maxlength="60" spellcheck="false"
        placeholder="Name this wheel (optional)…" aria-label="Wheel name" />

      <label class="fieldlabel" for="entries">
        <span>Options — one per line</span>
        <span class="count"><span id="count">0</span> entries</span>
      </label>
      <textarea id="entries" spellcheck="false" aria-describedby="entriesHelp"
        placeholder="Type one option per line…"></textarea>
      <p id="entriesHelp" class="visually-hidden">Each line becomes one slice of the wheel.</p>

      <div class="row">
        <button class="mini" id="shuffleBtn" type="button"><span aria-hidden="true">⤮</span> Shuffle order</button>
        <button class="mini" id="sortBtn"    type="button"><span aria-hidden="true">↕</span> Sort A–Z</button>
        <button class="mini" id="resetBtn"   type="button"><span aria-hidden="true">↺</span> Reset preset</button>
        <button class="mini" id="clearBtn"   type="button"><span aria-hidden="true">✕</span> Clear all</button>
      </div>

      <div class="toggles">
        <label class="toggle">
          <input type="checkbox" id="removeWinner" />
          <span>Remove winner after spin <small>(no repeats)</small></span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="soundOn" checked />
          <span>Tick &amp; chime sound</span>
        </label>
      </div>

      <button class="share-btn" id="shareBtn" type="button">🔗 Copy share link</button>
    </aside>
  </div>

  <footer>
    Built for the race to Athens · made with <span class="heart">♥</span> for Modern Euro
  </footer>
</main>

<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="resultName">
  <div class="result-card">
    <div class="result-eyebrow" id="resultEyebrow">The wheel has spoken</div>
    <div class="result-name"    id="resultName">—</div>
    <div class="result-sub"     id="resultSub"></div>
    <div class="result-actions">
      <button class="btn primary" id="spinAgain"   type="button">Spin again</button>
      <button class="btn"          id="closeModal"  type="button">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"><span class="toast-ico">✓</span><span id="toastMsg">Link copied!</span></div>

<div class="visually-hidden" aria-live="polite" id="live"></div>

<!-- ── Libraries ──────────────────────────────────────────────────────────── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<!-- ── App ────────────────────────────────────────────────────────────────── -->
<script>
(function () {
  "use strict";

  /* ── GSAP / confetti graceful fallback ─────────────────────────────────── */
  const G = (typeof gsap !== "undefined") ? gsap : { to(){}, from(){}, fromTo(){}, killTweensOf(){} };
  const fireConfetti = (typeof confetti === "function") ? confetti : null;

  /* ── Data ───────────────────────────────────────────────────────────────── */
  const PRESETS = {
    countries: {
      label: "🌍 Countries",
      items: ["United Kingdom","Belgium","Germany","Austria","Hungary","Croatia","Serbia",
              "Montenegro","Albania","Greece","France","Netherlands","Czech Republic",
              "Switzerland","Italy","Bosnia and Herzegovina","Poland","Bulgaria","Spain","Macedonia"]
    },
    teams: { label: "👥 Teams", items: ["Team 1","Team 2","Team 3","Team 4"] },
    difficulty: { label: "🎲 Difficulty", items: ["Easy","Medium","Hard"] },
    cursesEasy: {
      label: "💀 Curse · Easy",
      items: ["5 min time loss","Name 5 towns","Sabotage next team"],
      desc: {
        "5 min time loss": "Lose 5 minutes.",
        "Name 5 towns": "Submit 5 town names from your current location.",
        "Sabotage next team": "The next team to answer a medium question gets a sabotage (not you)."
      }
    },
    cursesMedium: {
      label: "💀 Curse · Medium",
      items: ["15 min time loss","Forced medium"],
      desc: { "15 min time loss": "Lose 15 minutes.", "Forced medium": "You must pick another medium question next time." }
    },
    cursesHard: {
      label: "💀 Curse · Hard",
      items: ["30 min time loss","Demoted"],
      desc: { "30 min time loss": "Lose 30 minutes.", "Demoted": "You're demoted back to your last location." }
    },
    custom: { label: "✍️ Custom", items: ["Pizza","Souvlaki","Waffles","Schnitzel","Croissant","Pierogi"] }
  };

  const SEG_COLORS = ["#E7C4D7","#E8D4A0","#CFE0C4","#F1E2C6","#E8C2D6","#E4D0A0"];
  const CONFETTI_COLORS = ["#C77DA1","#C2A576","#CFE0C4","#E7C4D7","#E8D4A0","#A8895A","#EFC5D8","#BE6E94"];
  const LABEL_COLOR = "#5E4B2B";

  /* ── DOM ────────────────────────────────────────────────────────────────── */
  const $ = id => document.getElementById(id);
  const canvas      = $("wheel");
  const ctx         = canvas.getContext("2d");
  const stage       = $("wheelStage");
  const wheelInner  = $("wheelInner");
  const pointerEl   = $("pointer");
  const spinBtn     = $("spinBtn");
  const ta          = $("entries");
  const countEl     = $("count");
  const presetsEl   = $("presets");
  const overlay     = $("overlay");
  const live        = $("live");
  const screenFlash = $("screenFlash");
  const wheelNameEl = $("wheelName");
  const taglineEl   = document.querySelector(".tagline");
  const DEFAULT_TAGLINE = taglineEl.textContent;
  const toastEl     = $("toast");
  const toastMsgEl  = $("toastMsg");

  let wheelName = "";

  /* ── Constants / state ──────────────────────────────────────────────────── */
  const TAU = Math.PI * 2;
  const POINTER_ANGLE = (3 * Math.PI) / 2;

  let entries = [];
  let rotation = Math.PI / 9;
  let spinning = false;
  let size = 480;
  let activePreset = "countries";
  let pendingRemoval = null;
  let winnerIdx = -1;
  const wpState = { v: 0 }; // winner-pulse 0→1, driven by GSAP

  const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* ── LocalStorage ───────────────────────────────────────────────────────── */
  const store = {
    get(k, d) { try { const v = localStorage.getItem(k); return v === null ? d : JSON.parse(v); } catch { return d; } },
    set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }
  };

  /* ══════════════════════════════════════════════════════════════════════════
     SHAREABLE LINKS  (entire wheel packed into the URL — no server needed)
  ══════════════════════════════════════════════════════════════════════════ */
  // UTF-8-safe, URL-safe base64 of {n: name, e: [entries]}
  function encodeWheel(name, items) {
    const json = JSON.stringify({ n: name || "", e: items });
    const b64  = btoa(unescape(encodeURIComponent(json)));
    return b64.replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
  }

  function decodeWheel(str) {
    try {
      let b = str.replace(/-/g, "+").replace(/_/g, "/");
      while (b.length % 4) b += "=";
      const o = JSON.parse(decodeURIComponent(escape(atob(b))));
      if (o && Array.isArray(o.e)) {
        const items = o.e.map(x => String(x).trim()).filter(Boolean);
        return { n: typeof o.n === "string" ? o.n : "", e: items };
      }
    } catch {}
    return null;
  }

  function buildShareLink() {
    const hash = "#w=" + encodeWheel(wheelName, entries);
    return location.origin + location.pathname + hash;
  }

  // Read a wheel out of the current URL hash, if present.
  function readSharedFromURL() {
    const m = location.hash.match(/[#&]w=([^&]+)/);
    return m ? decodeWheel(m[1]) : null;
  }

  function showToast(msg) {
    toastMsgEl.textContent = msg;
    G.killTweensOf(toastEl);
    G.fromTo(toastEl,
      { opacity: 0, y: 20 },
      { opacity: 1, y: 0, duration: 0.32, ease: "back.out(2)" });
    G.to(toastEl, { opacity: 0, y: 16, duration: 0.35, delay: 2, ease: "power2.in" });
  }

  async function shareWheel() {
    if (entries.length < 1) { showToast("Add some options first!"); return; }
    const url = buildShareLink();
    // Keep the address bar in sync so a manual copy also works.
    try { history.replaceState(null, "", "#w=" + encodeWheel(wheelName, entries)); } catch {}

    let copied = false;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(url);
        copied = true;
      }
    } catch {}
    if (!copied) {
      // Fallback for non-secure contexts / older browsers.
      const tmp = document.createElement("textarea");
      tmp.value = url; tmp.style.position = "fixed"; tmp.style.opacity = "0";
      document.body.appendChild(tmp); tmp.focus(); tmp.select();
      try { copied = document.execCommand("copy"); } catch {}
      document.body.removeChild(tmp);
    }

    if (copied) {
      showToast("Share link copied!");
      const b = $("shareBtn");
      b.classList.add("copied");
      const prev = b.textContent;
      b.textContent = "✓ Copied — paste to share";
      setTimeout(() => { b.classList.remove("copied"); b.textContent = prev; }, 2100);
    } else {
      showToast("Couldn't copy — link is in the address bar");
    }
  }

  function applyWheelName(name) {
    wheelName = (name || "").trim();
    wheelNameEl.value = wheelName;
    taglineEl.textContent = wheelName || DEFAULT_TAGLINE;
    document.title = wheelName ? (wheelName + " · Spinner") : "Jet Lag · Race to Athens — Spinner";
    store.set("jl_name", wheelName);
  }

  /* ══════════════════════════════════════════════════════════════════════════
     BACKGROUND PARTICLES
  ══════════════════════════════════════════════════════════════════════════ */
  const bgC   = $("bgCanvas");
  const bgCtx = bgC.getContext("2d");
  let particles = [];

  function mkParticle(randomY) {
    return {
      x: Math.random() * bgC.width,
      y: randomY ? Math.random() * bgC.height : bgC.height + 10,
      r: 0.8 + Math.random() * 2.5,
      vy: 0.18 + Math.random() * 0.42,
      vx: (Math.random() - 0.5) * 0.28,
      base: 0.03 + Math.random() * 0.10,
      phase: Math.random() * TAU,
      spd:   0.008 + Math.random() * 0.018,
      gold: Math.random() < 0.6
    };
  }

  function initBg() {
    bgC.width  = window.innerWidth;
    bgC.height = window.innerHeight;
    particles  = Array.from({ length: 75 }, () => mkParticle(true));
    (function loop() {
      bgCtx.clearRect(0, 0, bgC.width, bgC.height);
      const boost = spinning ? 3 : 1;
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.phase += p.spd;
        p.y -= p.vy * boost;
        p.x += p.vx * boost;
        if (p.y < -8 || p.x < -8 || p.x > bgC.width + 8) { particles[i] = mkParticle(false); continue; }
        const a = p.base * (0.45 + 0.55 * Math.sin(p.phase));
        bgCtx.beginPath();
        bgCtx.arc(p.x, p.y, p.r, 0, TAU);
        bgCtx.fillStyle = p.gold ? `rgba(194,165,118,${a})` : `rgba(199,125,161,${a})`;
        bgCtx.fill();
      }
      requestAnimationFrame(loop);
    })();
  }

  /* ══════════════════════════════════════════════════════════════════════════
     WHEEL TILT (parallax hover)
  ══════════════════════════════════════════════════════════════════════════ */
  if (!prefersReduced) {
    stage.addEventListener("mousemove", e => {
      if (spinning) return;
      const rc = stage.getBoundingClientRect();
      const dx = (e.clientX - rc.left - rc.width  / 2) / (rc.width  / 2);
      const dy = (e.clientY - rc.top  - rc.height / 2) / (rc.height / 2);
      G.to(wheelInner, { rotateX: -dy * 7, rotateY: dx * 7, transformPerspective: 900, duration: 0.25, ease: "power2.out" });
    });
    stage.addEventListener("mouseleave", () => {
      G.to(wheelInner, { rotateX: 0, rotateY: 0, duration: 0.6, ease: "power2.out" });
    });
  }

  /* ══════════════════════════════════════════════════════════════════════════
     PRESETS
  ══════════════════════════════════════════════════════════════════════════ */
  function buildPresetButtons() {
    presetsEl.innerHTML = "";
    Object.keys(PRESETS).forEach(key => {
      const b = document.createElement("button");
      b.type = "button";
      b.className = "preset" + (key === activePreset ? " active" : "");
      b.textContent = PRESETS[key].label;
      b.dataset.key = key;
      b.addEventListener("click", () => {
        G.fromTo(b, { scale: 0.88 }, { scale: 1, duration: 0.3, ease: "back.out(2.5)" });
        loadPreset(key);
      });
      presetsEl.appendChild(b);
    });
  }

  function markActive(key) {
    activePreset = key;
    [...presetsEl.children].forEach(b => b.classList.toggle("active", b.dataset.key === key));
  }

  function loadPreset(key) {
    markActive(key);
    const items = key === "custom"
      ? store.get("jl_custom", PRESETS.custom.items)
      : PRESETS[key].items.slice();
    setEntries(items);
    store.set("jl_lastPreset", key);
  }

  function setEntries(items) {
    entries = items.slice();
    ta.value = entries.join("\n");
    syncAndDraw();
  }

  /* ══════════════════════════════════════════════════════════════════════════
     TEXTAREA
  ══════════════════════════════════════════════════════════════════════════ */
  function readTA() {
    entries = ta.value.split("\n").map(s => s.trim()).filter(Boolean);
    if (activePreset !== "custom") { markActive("custom"); store.set("jl_lastPreset", "custom"); }
    store.set("jl_custom", entries);
    syncAndDraw();
  }

  function syncAndDraw() {
    countEl.textContent = entries.length;
    stage.classList.toggle("empty", entries.length === 0);
    const ok = entries.length >= 1 && !spinning;
    spinBtn.disabled = !ok;
    canvas.classList.toggle("disabled", entries.length < 1);
    const list = entries.join(", ");
    canvas.setAttribute("aria-label", entries.length
      ? `Prize wheel with ${entries.length} options: ${list.length > 160 ? list.slice(0,160)+"…" : list}`
      : "Prize wheel (empty)");
    drawWheel();
  }

  /* ══════════════════════════════════════════════════════════════════════════
     RESIZE
  ══════════════════════════════════════════════════════════════════════════ */
  function resize() {
    const dpr  = Math.min(window.devicePixelRatio || 1, 2.5);
    const rect  = stage.getBoundingClientRect();
    size = Math.max(220, Math.round(rect.width));
    canvas.width  = Math.round(size * dpr);
    canvas.height = Math.round(size * dpr);
    canvas.style.width  = size + "px";
    canvas.style.height = size + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    drawWheel();
  }

  /* ══════════════════════════════════════════════════════════════════════════
     DRAWING
  ══════════════════════════════════════════════════════════════════════════ */
  function segColor(i, n) {
    let c = SEG_COLORS[i % SEG_COLORS.length];
    if (i === n - 1 && c === SEG_COLORS[0] && n > 1) c = SEG_COLORS[1 % SEG_COLORS.length];
    return c;
  }

  function fitLabel(text, maxW) {
    if (ctx.measureText(text).width <= maxW) return text;
    let t = text;
    while (t.length > 1 && ctx.measureText(t + "…").width > maxW) t = t.slice(0, -1);
    return t + "…";
  }

  /* Core draw — accepts optional rotation override and skipClear flag */
  function drawWheel(rot, skipClear) {
    if (rot === undefined) rot = rotation;
    const cx = size / 2, cy = size / 2, r = size / 2 - 6;
    if (!skipClear) ctx.clearRect(0, 0, size, size);

    const n = entries.length;
    if (n === 0) {
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, TAU);
      ctx.fillStyle = "#F4ECD7"; ctx.fill();
      ctx.lineWidth = 6; ctx.strokeStyle = "#C2A576"; ctx.stroke();
      return;
    }

    const seg = TAU / n;

    /* Segments */
    for (let i = 0; i < n; i++) {
      const a0 = rot + i * seg;
      const a1 = a0 + seg;
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, a0, a1);
      ctx.closePath();

      /* Winner pulse: blend toward bright gold */
      if (i === winnerIdx && wpState.v > 0) {
        ctx.fillStyle = segColor(i, n); ctx.fill();
        ctx.fillStyle = `rgba(255,220,120,${wpState.v * 0.55})`; ctx.fill();
      } else {
        ctx.fillStyle = segColor(i, n); ctx.fill();
      }

      ctx.lineWidth = 2; ctx.strokeStyle = "rgba(251,246,233,0.88)"; ctx.stroke();
    }

    /* Tick marks at boundaries */
    if (n > 1 && n <= 32) {
      ctx.save();
      ctx.strokeStyle = "rgba(168,137,90,0.55)"; ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let i = 0; i < n; i++) {
        const a = rot + i * seg;
        ctx.moveTo(cx + Math.cos(a) * (r - 11), cy + Math.sin(a) * (r - 11));
        ctx.lineTo(cx + Math.cos(a) * (r - 2),  cy + Math.sin(a) * (r - 2));
      }
      ctx.stroke();
      ctx.restore();
    }

    /* Labels */
    const fs = Math.max(11, Math.min(24, Math.floor(r * seg * 0.42) + 7));
    ctx.font = `600 ${fs}px "Cormorant Garamond", Georgia, serif`;
    ctx.fillStyle = LABEL_COLOR;
    ctx.textBaseline = "middle";
    ctx.shadowColor = "rgba(255,253,246,0.92)"; ctx.shadowBlur = 3;
    const maxTW = r - Math.max(34, r * 0.16);

    for (let i = 0; i < n; i++) {
      const mid = rot + (i + 0.5) * seg;
      const m   = ((mid % TAU) + TAU) % TAU;
      const up  = m > Math.PI / 2 && m < (3 * Math.PI) / 2;
      ctx.save();
      ctx.translate(cx, cy); ctx.rotate(mid); ctx.translate(r - 14, 0);
      if (up) { ctx.rotate(Math.PI); ctx.textAlign = "left"; }
      else      { ctx.textAlign = "right"; }
      ctx.fillText(fitLabel(entries[i], maxTW), 0, 0);
      ctx.restore();
    }

    ctx.shadowBlur = 0; ctx.shadowColor = "transparent";

    /* Outer rings */
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, TAU);
    ctx.lineWidth = 8; ctx.strokeStyle = "#C2A576"; ctx.stroke();
    ctx.beginPath(); ctx.arc(cx, cy, r - 5, 0, TAU);
    ctx.lineWidth = 1.5; ctx.strokeStyle = "rgba(168,137,90,0.7)"; ctx.stroke();

    /* Cardinal dots on rim */
    [0, Math.PI/2, Math.PI, 3*Math.PI/2].forEach(a => {
      ctx.beginPath(); ctx.arc(cx + Math.cos(a)*r, cy + Math.sin(a)*r, 4, 0, TAU);
      ctx.fillStyle = "#C2A576"; ctx.fill();
    });

    /* Hub */
    const hubR = Math.max(26, r * 0.10);
    const hg = ctx.createRadialGradient(cx - hubR*0.25, cy - hubR*0.25, hubR*0.08, cx, cy, hubR);
    hg.addColorStop(0, "#fffef9"); hg.addColorStop(1, "#EFE4C9");
    ctx.beginPath(); ctx.arc(cx, cy, hubR, 0, TAU);
    ctx.fillStyle = hg; ctx.fill();
    ctx.lineWidth = 4; ctx.strokeStyle = "#C2A576"; ctx.stroke();

    /* Centre dot */
    const dotR = Math.max(7, r * 0.028);
    const dg = ctx.createRadialGradient(cx - dotR*0.3, cy - dotR*0.3, dotR*0.1, cx, cy, dotR);
    dg.addColorStop(0, "#E8A8C4"); dg.addColorStop(1, "#C77DA1");
    ctx.beginPath(); ctx.arc(cx, cy, dotR, 0, TAU);
    ctx.fillStyle = dg; ctx.fill();
  }

  /* ── Winner index ─────────────────────────────────────────────────────── */
  function winnerIndex(rot) {
    const n = entries.length;
    if (!n) return -1;
    const seg = TAU / n;
    const rel = (((POINTER_ANGLE - rot) % TAU) + TAU) % TAU;
    return Math.floor(rel / seg) % n;
  }

  /* ══════════════════════════════════════════════════════════════════════════
     AUDIO
  ══════════════════════════════════════════════════════════════════════════ */
  let audioCtx = null;

  function ensureAudio() {
    if (!$("soundOn").checked) return null;
    if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch { audioCtx = null; }
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function tick(speedFrac) {
    const ac = ensureAudio(); if (!ac) return;
    const freq = 550 + speedFrac * 500;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = "triangle"; o.frequency.value = freq;
    g.gain.setValueAtTime(0.0001, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.065, ac.currentTime + 0.003);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.055);
    o.connect(g).connect(ac.destination);
    o.start(); o.stop(ac.currentTime + 0.07);
  }

  function whoosh() {
    const ac = ensureAudio(); if (!ac) return;
    const buf = ac.createBuffer(1, Math.floor(ac.sampleRate * 0.45), ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * (1 - i/data.length) * 0.35;
    const s = ac.createBufferSource();
    const f = ac.createBiquadFilter();
    const g = ac.createGain();
    f.type = "bandpass"; f.frequency.value = 900; f.Q.value = 0.6;
    s.buffer = buf;
    g.gain.setValueAtTime(0, ac.currentTime);
    g.gain.linearRampToValueAtTime(0.32, ac.currentTime + 0.06);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.45);
    s.connect(f).connect(g).connect(ac.destination);
    s.start();
  }

  function chime() {
    const ac = ensureAudio(); if (!ac) return;
    const now = ac.currentTime;
    [523.25, 659.25, 783.99, 1046.5, 1318.5].forEach((freq, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = "triangle"; o.frequency.value = freq;
      const t = now + i * 0.09;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.15, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.65);
      o.connect(g).connect(ac.destination);
      o.start(t); o.stop(t + 0.7);
    });
    // bass resonance
    setTimeout(() => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = "sine"; o.frequency.value = 261.63;
      g.gain.setValueAtTime(0.0001, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.09, ac.currentTime + 0.05);
      g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 1.1);
      o.connect(g).connect(ac.destination);
      o.start(); o.stop(ac.currentTime + 1.2);
    }, 180);
  }

  /* ══════════════════════════════════════════════════════════════════════════
     SPIN
  ══════════════════════════════════════════════════════════════════════════ */
  function spin() {
    if (spinning || entries.length < 1) return;
    spinning = true;
    winnerIdx = -1;
    wpState.v = 0;
    spinBtn.disabled = true;
    canvas.classList.add("disabled", "spinning");
    stage.classList.add("is-spinning");
    G.to(wheelInner, { rotateX: 0, rotateY: 0, duration: 0.3 }); // reset tilt
    ensureAudio();
    whoosh();

    const n   = entries.length;
    const seg = TAU / n;
    const target = Math.floor(Math.random() * n);
    const jitter  = (Math.random() * 0.7 - 0.35) * seg;
    let finalRot  = POINTER_ANGLE - ((target + 0.5) * seg + jitter);
    const turns   = prefersReduced ? 2 : (5 + Math.floor(Math.random() * 3));
    while (finalRot <= rotation + turns * TAU - TAU) finalRot += TAU;

    if (prefersReduced) {
      rotation = ((finalRot % TAU) + TAU) % TAU;
      drawWheel(); finishSpin(); return;
    }

    const startRot  = rotation;
    const delta     = finalRot - startRot;
    const duration  = 4200 + Math.random() * 900;
    const startTime = performance.now();
    let lastIdx     = winnerIndex(startRot);

    function ease(t) { return 1 - Math.pow(1 - t, 5); } // quintic out

    function frame(now) {
      const t     = Math.min(1, (now - startTime) / duration);
      const speed = Math.max(0, 1 - t * 1.85);
      rotation    = startRot + delta * ease(t);

      ctx.clearRect(0, 0, size, size);

      /* ── Motion blur ghost frames ─── */
      if (speed > 0.15) {
        const b = speed * 0.014;
        ctx.globalAlpha = 0.16 * speed; drawWheel(rotation - delta * b * 2, true);
        ctx.globalAlpha = 0.30 * speed; drawWheel(rotation - delta * b,     true);
        ctx.globalAlpha = 1;
      }
      drawWheel(rotation, true);

      /* ── Speed lines ─── */
      if (speed > 0.45) {
        const cx = size/2, cy = size/2, r = size/2 - 6;
        const N = 20;
        ctx.save();
        ctx.strokeStyle = `rgba(194,165,118,${speed * 0.2})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let i = 0; i < N; i++) {
          const a = (i / N) * TAU + rotation * 2.5;
          ctx.moveTo(cx + Math.cos(a) * r * 0.72, cy + Math.sin(a) * r * 0.72);
          ctx.lineTo(cx + Math.cos(a) * (r + 17),  cy + Math.sin(a) * (r + 17));
        }
        ctx.stroke();
        ctx.restore();
      }

      const idx = winnerIndex(rotation);
      if (idx !== lastIdx) { lastIdx = idx; tick(speed); }

      if (t < 1) { requestAnimationFrame(frame); }
      else { rotation = ((finalRot % TAU) + TAU) % TAU; drawWheel(); finishSpin(); }
    }
    requestAnimationFrame(frame);
  }

  function finishSpin() {
    spinning = false;
    canvas.classList.remove("disabled", "spinning");
    stage.classList.remove("is-spinning");

    winnerIdx = winnerIndex(rotation);
    const winner = entries[winnerIdx];
    pendingRemoval = $("removeWinner").checked ? winner : null;

    /* Pointer bounce */
    G.fromTo(pointerEl, { y: 0 }, {
      y: -16, duration: 0.13, ease: "power2.out",
      yoyo: true, repeat: 5,
      onComplete() {
        pointerEl.classList.add("landing");
        setTimeout(() => pointerEl.classList.remove("landing"), 1700);
      }
    });

    /* Winner segment pulse via GSAP */
    G.to(wpState, {
      v: 1, duration: 0.22, yoyo: true, repeat: 7, ease: "sine.inOut",
      onUpdate() { drawWheel(); }
    });

    chime();
    setTimeout(() => { showResult(winner); confettiBurst(); }, 620);

    live.textContent = "";
    setTimeout(() => { live.textContent = "Winner: " + winner; }, 820);
  }

  /* ══════════════════════════════════════════════════════════════════════════
     RESULT MODAL
  ══════════════════════════════════════════════════════════════════════════ */
  const isCurse = () => activePreset.startsWith("curses");

  function subtext() {
    if (isCurse()) return "Fulfil this before you advance.";
    if (activePreset === "countries")  return "Next stop on the road to Athens";
    if (activePreset === "teams")      return "It's your turn";
    if (activePreset === "difficulty") return "Pick a question at this level";
    return "The wheel has chosen";
  }
  function eyebrow() {
    if (isCurse()) return "Your curse 💀";
    if (activePreset === "countries")  return "Next destination";
    if (activePreset === "teams")      return "Up next";
    if (activePreset === "difficulty") return "Question level";
    return "The wheel has spoken";
  }

  function showResult(name) {
    const detail = PRESETS[activePreset]?.desc?.[name];
    $("resultName").textContent   = name;
    $("resultEyebrow").textContent = eyebrow();
    $("resultSub").textContent    = detail || subtext();

    const card = overlay.querySelector(".result-card");
    card.classList.remove("correct","wrong");
    if (isCurse())                    card.classList.add("wrong");
    else if (activePreset==="countries") card.classList.add("correct");

    document.querySelector("main.frame").setAttribute("inert","");
    overlay.classList.add("show");

    /* Screen flash */
    G.fromTo(screenFlash, { opacity: 0.55 }, { opacity: 0, duration: 0.55, ease: "power2.out" });

    /* Card entrance — spring + slight 3-D flip */
    G.fromTo(card,
      { scale: 0.55, opacity: 0, rotationY: -25, transformPerspective: 900 },
      { scale: 1, opacity: 1, rotationY: 0, duration: 0.58, ease: "back.out(1.65)", clearProps: "transform,opacity" }
    );

    $("spinAgain").focus();
  }

  function closeResult() {
    overlay.classList.remove("show");
    document.querySelector("main.frame").removeAttribute("inert");
    winnerIdx  = -1;
    wpState.v  = 0;

    if (pendingRemoval !== null) {
      const i = entries.indexOf(pendingRemoval);
      if (i >= 0) {
        entries.splice(i, 1);
        ta.value = entries.join("\n");
        if (activePreset === "custom") store.set("jl_custom", entries);
      }
      pendingRemoval = null;
    }
    syncAndDraw();
    spinBtn.focus();
  }

  /* ══════════════════════════════════════════════════════════════════════════
     CONFETTI
  ══════════════════════════════════════════════════════════════════════════ */
  function confettiBurst() {
    if (prefersReduced || !fireConfetti) return;
    const colors = CONFETTI_COLORS;
    fireConfetti({ particleCount: 130, spread: 80, origin: { y: 0.55 }, colors, scalar: 1.25, shapes: ["circle","square"] });
    setTimeout(() => {
      fireConfetti({ particleCount: 85, angle: 60,  spread: 62, origin: { x: 0, y: 0.6 }, colors });
      fireConfetti({ particleCount: 85, angle: 120, spread: 62, origin: { x: 1, y: 0.6 }, colors });
    }, 230);
    setTimeout(() => {
      fireConfetti({ particleCount: 70, spread: 110, origin: { y: 0.28 }, colors, startVelocity: 18, gravity: 0.55, ticks: 220 });
    }, 430);
  }

  /* ══════════════════════════════════════════════════════════════════════════
     UTILITIES
  ══════════════════════════════════════════════════════════════════════════ */
  function shuffle() {
    for (let i = entries.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i+1));
      [entries[i], entries[j]] = [entries[j], entries[i]];
    }
    ta.value = entries.join("\n");
    if (activePreset === "custom") store.set("jl_custom", entries);
    syncAndDraw();
  }

  function sortAZ() {
    entries.sort((a,b) => a.localeCompare(b));
    ta.value = entries.join("\n");
    if (activePreset === "custom") store.set("jl_custom", entries);
    syncAndDraw();
  }

  /* ══════════════════════════════════════════════════════════════════════════
     EVENTS
  ══════════════════════════════════════════════════════════════════════════ */
  spinBtn.addEventListener("click", spin);
  canvas.addEventListener("click",  () => { if (!spinBtn.disabled) spin(); });
  ta.addEventListener("input", readTA);

  $("shuffleBtn").addEventListener("click", shuffle);
  $("sortBtn").addEventListener("click", sortAZ);
  $("resetBtn").addEventListener("click", () => loadPreset(activePreset));
  $("clearBtn").addEventListener("click", () => {
    setEntries([]);
    if (activePreset === "custom") store.set("jl_custom", []);
    ta.focus();
  });

  $("spinAgain").addEventListener("click",  () => { closeResult(); setTimeout(spin, 120); });
  $("closeModal").addEventListener("click", closeResult);
  overlay.addEventListener("click", e => { if (e.target === overlay) closeResult(); });

  $("shareBtn").addEventListener("click", shareWheel);

  wheelNameEl.addEventListener("input", () => {
    wheelName = wheelNameEl.value.trim();
    taglineEl.textContent = wheelName || DEFAULT_TAGLINE;
    document.title = wheelName ? (wheelName + " · Spinner") : "Jet Lag · Race to Athens — Spinner";
    store.set("jl_name", wheelName);
  });

  $("soundOn").addEventListener("change",      e => store.set("jl_sound",        e.target.checked));
  $("removeWinner").addEventListener("change", e => store.set("jl_removeWinner", e.target.checked));

  document.addEventListener("keydown", e => {
    if (overlay.classList.contains("show")) {
      if (e.key === "Escape") { closeResult(); return; }
      if (e.key === "Tab") {
        const btns = overlay.querySelectorAll("button");
        if (btns.length) {
          const [first, last] = [btns[0], btns[btns.length-1]];
          if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
          else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      }
      return;
    }
    if (e.key === " " || e.key === "Enter") {
      const tag = document.activeElement?.tagName;
      if (tag === "BUTTON" || tag === "TEXTAREA" || tag === "INPUT" || tag === "A") return;
      e.preventDefault();
      if (!spinBtn.disabled) spin();
    }
  });

  window.addEventListener("resize", () => {
    clearTimeout(window.__rsz);
    window.__rsz = setTimeout(resize, 120);
    clearTimeout(window.__bgrsz);
    window.__bgrsz = setTimeout(() => { bgC.width = window.innerWidth; bgC.height = window.innerHeight; }, 200);
  });

  /* ══════════════════════════════════════════════════════════════════════════
     INIT
  ══════════════════════════════════════════════════════════════════════════ */
  function init() {
    buildPresetButtons();
    $("soundOn").checked      = store.get("jl_sound", true);
    $("removeWinner").checked = store.get("jl_removeWinner", false);

    const shared = readSharedFromURL();
    if (shared && shared.e.length) {
      // A shared link wins over everything — load exactly what was sent.
      activePreset = "custom";
      markActive("custom");
      entries = shared.e.slice();
      ta.value = entries.join("\n");
      applyWheelName(shared.n);
      // Persist locally so a refresh (or clearing the hash) keeps the shared wheel.
      store.set("jl_custom", entries);
      store.set("jl_lastPreset", "custom");
    } else {
      const last = store.get("jl_lastPreset", "countries");
      activePreset = PRESETS[last] ? last : "countries";
      markActive(activePreset);

      entries = (activePreset === "custom"
        ? store.get("jl_custom", PRESETS.custom.items)
        : PRESETS[activePreset].items.slice()).slice();
      ta.value = entries.join("\n");
      applyWheelName(store.get("jl_name", ""));
    }

    resize();
    syncAndDraw();
    initBg();
  }

  if (document.fonts?.ready) document.fonts.ready.then(() => drawWheel());
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
  else init();

})();
</script>
</body>
</html>
